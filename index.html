<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Weather App 🌤️</h1>
        <div id="current-time"></div> <!-- Time Display -->

        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Get Weather</button>
        <div id="weather"></div>
        
        <!-- Global Weather Updates & Fun Facts -->
        <div id="global-weather"></div>
        <div id="fun-fact"></div>
    </div>

    <!-- Footer with 50% opacity -->
    <footer>
        <p>Created by Sumukh R and Team</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
