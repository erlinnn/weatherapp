<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌎 Live Weather App</h1>
        <p id="time"></p> <!-- Live Time -->
    </header>

    <main>
        <div class="container">
            <h2>Check Your City's Weather 🌤️</h2>
            <input type="text" id="city" placeholder="Enter city or area name">
            <button onclick="getWeather()">Get Weather</button>
            <div id="weather"></div>
            <div id="loading" class="hidden">Loading...</div>
        </div>

        <div class="fun-facts">
            <h3>🌍 Did You Know?</h3>
            <p id="fact">Loading fun fact...</p> <!-- Fun Fact -->
        </div>

        <div class="global-weather">
            <h3>🌦️ Global Weather Updates</h3>
            <ul id="global-updates"></ul> <!-- Live World Weather -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
